include colors/vscode.conf

# Font and size
font_family         JetBrainsMono Nerd Font
bold_font           auto
italic_font         auto
bold_italic_font    auto

font_size 12.5

# Window padding
window_padding_width 8

# Disable prompt when closing windows
confirm_os_window_close 0

# Let aerc open image previews as kitty overlays.
allow_remote_control yes

# Reuse a single kitty process so later launches are faster.
single_instance yes

# Disable bell
enable_audio_bell no

# Faster refresh rate
sync_to_monitor yes

# Smooth touchpad scrolling and kitty-managed inertial scrolling.
pixel_scroll yes
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
momentum_scroll 0.985

# Open a new kitty OS window from the current working directory.
map ctrl+shift+n launch --type=os-window --copy-env --cwd=current
