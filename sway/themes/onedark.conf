# OneDark palette
set $bg      #1e222a
set $fg      #abb2bf
set $black   #282c34
set $red     #e06c75
set $green   #98c379
set $yellow  #e5c07b
set $blue    #61afef
set $magenta #c678dd
set $cyan    #56b6c2
set $white   #dcdfe4

# Borders
default_border pixel 2
default_floating_border pixel 2

# Window states
client.focused          $blue    $bg $fg $blue
client.focused_inactive $black   $bg $fg $black
client.unfocused        $black   $bg $fg $black
client.urgent           $red     $bg $fg $red
client.placeholder      $black   $bg $fg $black

# Gaps (optional, Archcraft-like feel)
gaps inner 8
gaps outer 4
